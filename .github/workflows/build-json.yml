name: Build JSON from TSV

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - name: Run TSV → JSON converter
        run: |
          chmod +x tsv2json.js
          ./tsv2json.js

      - name: Upload JSON artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sat2018-sutra-names
          path: json/
